services:
  janky-thermostat:
    image: ${JANKY_IMAGE:-janky-thermostat:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        BASE_IMAGE: ${BASE_IMAGE:-debian:trixie-slim}
    container_name: janky-thermostat
    restart: unless-stopped
    volumes:
      - ${JANKY_CONFIG_PATH:-./config.json}:/config/config.json:ro
