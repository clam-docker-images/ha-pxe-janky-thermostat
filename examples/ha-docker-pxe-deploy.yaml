# Example ha-docker-pxe-deploy config for running this thermostat with docker-rgpio.
# Replace the serial, SSH key, hostname, and MQTT broker hostname/IP to match your environment.
# Add more /dev/gpiochip* entries if your Raspberry Pi exposes additional gpiochips.
# Add or remove /dev/i2c-* entries to match the I2C buses exposed on your host.

log_level: info
server_ip: 
default_username: pi
default_password: ""
default_timezone: Australia/Melbourne
default_keyboard_layout: us
default_locale: en_AU.UTF-8
ssh_authorized_keys: |
  ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIE6A4C2WQY0gVxk7bP5fA8Bf4m3jX9pW5rP8YqL3m7wN user@example
clients:
  - serial: "cdc843d7"
    model: pi4
    hostname: janky
    image_arch: auto
    rebuild: false
    containers: |
      [
        {
          "name": "rgpiod",
          "image": "ghcr.io/clam-docker-images/docker-rgpio:latest",
          "env": {
            "RGPIOD_PORT": "8889",
            "RGPIOD_LOCAL_ONLY": "0"
          },
          "ports": [
            "8889:8889"
          ],
          "devices": [
            "/dev/gpiochip0:/dev/gpiochip0",
            "/dev/i2c-1:/dev/i2c-1",
            "/dev/i2c-2:/dev/i2c-2"
          ]
        },
        {
          "name": "janky-thermostat",
          "image": "ghcr.io/clam-docker-images/janky-thermostat:latest",
          "depends_on": [
            "rgpiod"
          ],
          "files": [
            {
              "container_path": "/config/config.json",
              "format": "json",
              "content": {
                "schedule": ["06:00 21.0", "22:30 18.0"],
                "schedule_slots": 6,
                "min_temp": 20.0,
                "max_temp": 28.0,
                "posmin": 1034,
                "posmax": 24600,
                "posmargin": 50,
                "speed": 50.0,
                "lograte": 10,
                "updaterate": 15,
                "updir": 1,
                "i2c_bus": 0,
                "rgpio_addr": "rgpiod",
                "rgpio_port": 8889,
                "loglevel": "WARNING"
              }
            }
          ]
        }
      ]
